name: Deploy to S3

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - '**.html'
      - '**.css'
      - '**.js'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Sync files to S3
      run: |
        aws s3 sync . s3://ruthzenabu-github-actions-site/ --endpoint-url=${{ secrets.AWS_ENDPOINT_URL }} --exclude ".git/*" --exclude ".github/*"
    
    - name: Deployment complete
      run: |
        echo "Deployment completed to s3://ruthzenabu-github-actions-site"
        echo "Website URL: http://ruthzenabu-github-actions-site.s3-website-us-east-1.amazonaws.com"
