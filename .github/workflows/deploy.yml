name: Deploy to S3

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'
      - '**.html'
      - '**.css'
      - '**.js'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS Credentials
      run: |
        echo "Using Floci S3 emulator"

    - name: Sync files to S3
      run: |
        aws s3 sync . s3://ruthzenabu-github-actions-site/ \
        --endpoint-url=${{ secrets.AWS_ENDPOINT_URL }} \
        --exclude ".git/*" \
        --exclude ".github/*"

    - name: Deployment complete
      run: |
        echo "Deployment completed to s3://ruthzenabu-github-actions-site"
